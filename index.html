<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فريق النبراس التطوعي - مكتبة الملفات</title>
    
    <style>
        :root {
            --primary-color: #1e3799; 
            --accent-color: #f6b93b;  
            --bg-color: #f1f2f6;
            --white: #ffffff;
            --text-dark: #2f3542;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); min-height: 100vh; }

        /* --- تصميم البار العلوي والبحث الجديد --- */
        .navbar { 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; /* يضع الشعار يميناً والأيقونات يساراً */
            align-items: center; 
            background: var(--white); 
        }
        .logo { font-size: 1.4rem; font-weight: bold; color: var(--primary-color); }
        
        .nav-actions { display: flex; gap: 15px; align-items: center; }
        
        .nav-icon { 
            cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; 
            width: 38px; height: 38px; border-radius: 50%; background: var(--bg-color); 
            transition: var(--transition); color: var(--primary-color); border: none; outline: none;
        }
        .nav-icon:hover { background: var(--accent-color); color: var(--white); transform: scale(1.1); }
        .nav-icon svg { width: 22px; height: 22px; fill: currentColor; }

        .menu-icon { cursor: pointer; display: flex; flex-direction: column; gap: 6px; padding: 5px; }
        .menu-icon span { width: 30px; height: 4px; background-color: var(--primary-color); border-radius: 2px; }

        /* شريط البحث الثابت تحت البار العلوي مباشرة */
        #search-bar-container { 
            display: flex; gap: 10px; padding: 15px 5%; 
            background: var(--white); box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            width: 100%; box-sizing: border-box;
            margin-bottom: 20px; /* مسافة بينه وبين المحتوى */
        }
        #search-input { 
            flex: 1; padding: 12px 15px; border: 2px solid #ddd; 
            border-radius: 10px; outline: none; font-size: 1rem; transition: 0.3s;
            width: 100%;
        }
        #search-input:focus { border-color: var(--primary-color); }
        #search-btn { 
            padding: 10px 20px; background: var(--primary-color); color: white; 
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;
            white-space: nowrap;
        }
        #search-btn:hover { background: var(--accent-color); color: var(--primary-color); }

        /* --- باقي التنسيقات --- */
        .main-content { padding: 20px; max-width: 800px; margin: 0 auto; text-align: center; }
        .screen { display: none; animation: slideUp 0.6s ease forwards; }
        .screen.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        h2 { margin-bottom: 30px; font-size: 1.8rem; color: var(--primary-color); }
        .btn-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        
        .btn { 
            background: var(--white); border: 2px solid transparent; padding: 20px; 
            border-radius: 15px; font-size: 1.1rem; font-weight: bold; 
            color: var(--primary-color); cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: var(--transition); 
        }
        .btn:hover { border-color: var(--accent-color); transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        
        .back-btn { margin-bottom: 20px; background: none; border: none; color: var(--primary-color); font-weight: bold; cursor: pointer; font-size: 1rem; display: block; }

        #files-list { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; width: 100%; }

        .file-card { 
            background: var(--white); padding: 20px; border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); border-right: 6px solid var(--primary-color);
            width: 100%; box-sizing: border-box; 
        }

        .file-name { 
            font-weight: 600; font-size: 1.05rem; color: var(--text-dark); 
            text-align: center; word-wrap: break-word; overflow-wrap: break-word;
            width: 100%; line-height: 1.6;
        }

        .download-link { 
            background: var(--primary-color); color: var(--white); padding: 12px 25px; 
            border-radius: 10px; text-decoration: none; font-size: 0.95rem; 
            font-weight: bold; transition: var(--transition);
            min-width: 140px; text-align: center;
        }
        .download-link:hover { background: var(--accent-color); color: var(--primary-color); }

        @media (min-width: 600px) {
            .file-card { flex-direction: row; justify-content: space-between; text-align: right; }
            .file-name { text-align: right; }
        }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #subjects-screen .btn-list { display: flex; flex-direction: column; gap: 15px; }
        #years-screen .btn-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; }

        /* القائمة الجانبية */
        .sidebar {
            position: fixed; top: 0; left: -320px; width: 320px; height: 100%;
            background: linear-gradient(145deg, #ffffff 0%, #f1f2f6 100%);
            box-shadow: 5px 0 25px rgba(0,0,0,0.15); transition: var(--transition);
            z-index: 1000; padding: 30px 20px; overflow-y: auto; border-right: 4px solid var(--accent-color);
        }
        .sidebar.active { left: 0; }
        .sidebar-header { text-align: center; margin-bottom: 30px; padding-bottom: 10px; border-bottom: 2px dashed #dcdde1; }
        .sidebar-header h3 { color: var(--primary-color); font-size: 1.5rem; font-weight: 900;}

        .login-btn {
            display: block; width: 100%; text-align: center; background: var(--accent-color); color: var(--primary-color);
            padding: 15px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer;
            text-decoration: none; margin-bottom: 25px; transition: 0.3s; box-shadow: 0 4px 10px rgba(246, 185, 59, 0.3);
        }
        .login-btn:hover { background: var(--primary-color); color: var(--white); transform: translateY(-3px); }

        .accordion-item { margin-bottom: 15px; border-radius: 12px; overflow: hidden; background: var(--white); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .accordion-btn {
            background: var(--white); color: var(--primary-color); cursor: pointer; padding: 18px; width: 100%; border: none;
            text-align: right; outline: none; font-size: 1rem; font-weight: bold; transition: 0.4s; display: flex; justify-content: space-between; align-items: center;
        }
        .accordion-btn:hover, .accordion-btn.active { background: var(--primary-color); color: var(--white); }
        .accordion-btn::after { content: '\002B'; font-size: 1.5rem; transition: 0.3s; }
        .accordion-btn.active::after { content: '\2212'; transform: rotate(180deg); }

        .accordion-content {
            padding: 0 18px; background-color: #fafbfc; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out;
            font-size: 0.95rem; line-height: 1.8; color: var(--text-dark);
        }
        .accordion-content p { padding: 15px 0; }
        .accordion-content a { color: var(--primary-color); font-weight: bold; text-decoration: none; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 900; backdrop-filter: blur(3px); }
        .overlay.active { display: block; }
        
        .file-actions { display: flex; align-items: center; gap: 15px; }
        .fav-btn { cursor: pointer; font-size: 1.6rem; user-select: none; transition: transform 0.2s; background: none; border: none; }
        .fav-btn:hover { transform: scale(1.2); }
        .viewed-badge { 
            background: #2ed573; color: white; padding: 4px 10px; 
            border-radius: 20px; font-size: 0.75rem; font-weight: bold; 
            display: inline-flex; align-items: center; gap: 5px;
        }
        #navbar-logo {
    height: 60px; /* يمكنك تعديل هذا الرقم لتكبير أو تصغير الشعار */
    width: auto;
    object-fit: contain;
    display: block;
}
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>فريق النبراس</h3>
        </div>

                <img id="user-pic" src="" alt="صورة الحساب" style="width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--primary-color); object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">

            <div id="user-menu" style="display: none; flex-direction: column; gap: 10px; margin-bottom: 25px;">

        <div class="accordion-item">

                رابط المناقشة:<br>
                <a href="https://t.me/+Efbvekrb6lBhNWQ0" target="_blank" dir="ltr" style="display:inline-block; margin-top:5px;">https://t.me/+Efbvekrb6lBhNWQ0</a></p>
            </div>
        </div>

        <div class="accordion-item">
            <button class="accordion-btn">المطور</button>
            <div class="accordion-content">
                <p style="direction: ltr; text-align: right; font-weight: bold; color: var(--primary-color);">maher.ghzzawi@gmail.com</p>

    </div>

    <nav class="navbar">
       <div class="logo">
    <img src="https://i.ibb.co/xK2Fxs0y/photo-2026-04-28-03-01-51-removebg-preview.png" alt="فريق النبراس التطوعي" id="navbar-logo">
</div>
        <div class="nav-actions">
            <a href="https://t.me/NibrasInstituteBot" target="_blank" class="nav-icon" title="بوت النبراس">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.19-.08-.05-.19-.02-.27 0-.12.03-1.96 1.25-5.54 3.67-.52.36-.99.54-1.41.53-.46-.01-1.35-.26-2.01-.48-.81-.27-1.46-.42-1.4-.88.03-.23.36-.48.98-.75 3.84-1.67 6.4-2.78 7.68-3.32 3.65-1.53 4.41-1.8 4.9-1.81.11 0 .36.03.5.15.11.1.15.23.16.35-.01.06-.01.12-.02.24z"/></svg>
            </a>
            <div class="menu-icon" onclick="toggleSidebar()">
                <span></span><span></span><span></span>

    <div id="search-bar-container">
        <input type="text" id="search-input" placeholder="ابحث عن اسم الملف هنا..." onkeyup="if(event.key === 'Enter') executeSearch()">
        <button id="search-btn" onclick="executeSearch()">بحث</button>
    </div>

    <main class="main-content">
        <section id="subjects-screen" class="screen active">
            <h2>المواد الدراسية</h2>
            <div class="btn-list">
                <button class="btn" onclick="openYearScreen('الرياضيات')">الرياضيات</button>
                <button class="btn" onclick="openYearScreen('العلوم')">العلوم</button>
                <button class="btn" onclick="openYearScreen('اللغة العربية')">اللغة العربية</button>
                <button class="btn" onclick="openYearScreen('اللغة الإنجليزية')">اللغة الإنجليزية</button>
                <button class="btn" onclick="openYearScreen('الكيمياء')">الكيمياء</button>
            </div>
        </section>

        <section id="years-screen" class="screen">
            <button class="back-btn" onclick="showScreen('subjects-screen')"> &rarr; العودة للمواد</button>
            <h2 id="subject-title">المادة</h2>
            <div class="btn-list">
                <button class="btn" onclick="loadFiles('2023')">2023</button>
                <button class="btn" onclick="loadFiles('2024')">2024</button>
                <button class="btn" onclick="loadFiles('2025')">2025</button>
                <button class="btn" onclick="loadFiles('2026')">2026</button>
            </div>
        </section>

        <section id="files-screen" class="screen">
            <button id="dynamic-back-btn" class="back-btn" onclick="showScreen('years-screen')"> &rarr; العودة للأعوام</button>
            <h2 id="files-title">الملفات المتاحة</h2>
            <div id="loader" class="loader"></div>
            <div id="files-list"></div>
        </section>

    <script type="module">
        // تمت إضافة دالة get للاستخدام في البحث لمرة واحدة وتفادي المشاكل
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBZIfcH0HI0Nm3aXN8uoP4C6y49cF0Qvl4",
            authDomain: "al-nibras-bf98e.firebaseapp.com",
            projectId: "al-nibras-bf98e",
            databaseURL: "https://al-nibras-bf98e-default-rtdb.firebaseio.com", 
            messagingSenderId: "453402650871",
            appId: "1:453402650871:web:092b37acf5c8575ec88bf2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null; 
        let userFavorites = {}; 
        let userHistory = {};  

        let selectedSubject = "";

     
window.showScreen = function(screenId, pushToHistory = true) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
    window.scrollTo({top: 0, behavior: 'smooth'});

    // إذا كان الانتقال جديداً (وليس ناتجاً عن ضغط زر الرجوع)، نحفظه في التاريخ
    if (pushToHistory) {
        history.pushState({ screen: screenId }, "", "#" + screenId);
    }
}

        window.openYearScreen = function(subject) {
            selectedSubject = subject;
            document.getElementById('subject-title').innerText = subject;
            showScreen('years-screen');
        }

        window.loadFiles = function(year) {
            const listContainer = document.getElementById('files-list');
            const loader = document.getElementById('loader'); 
            
            // ضبط زر العودة للأعوام
            document.getElementById('dynamic-back-btn').onclick = function() { showScreen('years-screen'); };
            document.getElementById('dynamic-back-btn').innerHTML = " &rarr; العودة للأعوام";
            document.getElementById('files-title').innerText = selectedSubject + " - لعام " + year;

            listContainer.innerHTML = ""; 
            loader.style.display = "block"; 
            showScreen('files-screen');

            const path = `${selectedSubject}/${year}`; 
            const filesRef = ref(db, path);
            
            onValue(filesRef, (snapshot) => {
                loader.style.display = "none"; 
                const data = snapshot.val();
                
                if (data) {
                    Object.keys(data).forEach(fileId => {
                        const file = data[fileId];
                        const isFav = userFavorites[fileId] ? '❤️' : '🤍';
                        const isViewed = userHistory[fileId] ? `<span class="viewed-badge">✓ تم العرض</span>` : '';
                        const safeName = file.name.replace(/'/g, "\\'");

        listContainer.innerHTML += `
    <div class="file-card">
        <div class="file-name" id="name-${fileId}">
            ${isViewed} ${file.name}
        </div>
        <div class="file-actions">
            <button class="fav-btn" id="fav-icon-${fileId}" onclick="toggleFavorite('${fileId}', '${safeName}', '${file.url}')">
                ${isFav}
            </button>
            <a href="${file.url}" target="_blank" class="download-link" onclick="markAsViewed('${fileId}', '${safeName}', '${file.url}')">
                فتح الملف
            </a>
        </div>
    </div>
`;
                    });
                } else {
                    listContainer.innerHTML = "<p style='padding:20px; color:#666;'>لا توجد ملفات متوفرة حالياً لهذا العام.</p>";
                }
            }, { onlyOnce: true });
        }

        // --- دالة البحث المحسنة باستخدام get للتعامل مع الأخطاء وإيقاف الدوران اللانهائي ---
window.executeSearch = function() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            if(!query) return;

            const listContainer = document.getElementById('files-list');
            const loader = document.getElementById('loader');
            
            listContainer.innerHTML = ""; 
            loader.style.display = "block"; 
            
            // ضبط زر العودة للرئيسية
            document.getElementById('dynamic-back-btn').onclick = function() { showScreen('subjects-screen'); };
            document.getElementById('dynamic-back-btn').innerHTML = " &rarr; العودة للرئيسية";
            document.getElementById('files-title').innerText = "نتائج البحث عن: " + query;
            
            showScreen('files-screen');

            const dbRef = ref(db, '/');
            // استخدمنا get بدلاً من onValue لالتقاط الخطأ بشكل صحيح في حال حدوثه
            get(dbRef).then((snapshot) => {
                loader.style.display = "none";
                const allData = snapshot.val();
                let resultsFound = false;

                if (allData) {
                    Object.keys(allData).forEach(subject => {
                        if (subject === 'users') return; // تخطي مجلد المستخدمين الخاص
                        
                        const years = allData[subject];
                        if (typeof years !== 'object') return; // لتجنب الأخطاء إذا كانت البيانات نصية

                        Object.keys(years).forEach(year => {
                            const files = years[year];
                            if (typeof files !== 'object') return;

                            Object.keys(files).forEach(fileId => {
                                const file = files[fileId];
                                
                                if (file && file.name && file.name.toLowerCase().includes(query)) {
                                    resultsFound = true;
                                    const isFav = userFavorites[fileId] ? '❤️' : '🤍';
                                    const isViewed = userHistory[fileId] ? `<span class="viewed-badge">✓ تم العرض</span>` : '';
                                    const safeName = file.name.replace(/'/g, "\\'");

                                    listContainer.innerHTML += `
                                        <div class="file-card">
                                            <div class="file-name">
                                                <span style="font-size: 0.8rem; color: var(--primary-color); display: block; margin-bottom: 5px;">${subject} - ${year}</span>
                                                ${isViewed} ${file.name}
                                            </div>
                                            <div class="file-actions">
                                                <button class="fav-btn" onclick="toggleFavorite('${fileId}', '${safeName}', '${file.url}')">${isFav}</button>
                                                <a href="${file.url}" target="_blank" class="download-link" onclick="markAsViewed('${fileId}', '${safeName}', '${file.url}')">فتح الملف</a>
                                            </div>
                                        </div>
                                    `;
                                }
                            });
                        });
                    });
                }

                if (!resultsFound) {
                    listContainer.innerHTML = "<p style='padding:20px; color:#666;'>لم يتم العثور على ملفات تطابق بحثك.</p>";
                }
            }).catch((error) => {
                // إيقاف التحميل وإظهار رسالة خطأ واضحة
                loader.style.display = "none";
                listContainer.innerHTML = `<p style='padding:20px; color:red; font-weight:bold;'>حدث خطأ أثناء البحث. يرجى التحقق من اتصالك بالإنترنت.</p>`;
                console.error("خطأ في البحث:", error);
            });
        }

        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        const acc = document.getElementsByClassName("accordion-btn");
        for (let i = 0; i < acc.length; i++) {
            acc[i].addEventListener("click", function() {
                for (let j = 0; j < acc.length; j++) {
                    if (acc[j] !== this && acc[j].classList.contains("active")) {
                        acc[j].classList.remove("active");
                        acc[j].nextElementSibling.style.maxHeight = null;
                    }
                }
                
                this.classList.toggle("active");
                const panel = this.nextElementSibling;
                if (panel.style.maxHeight) {
                    panel.style.maxHeight = null;
                } else {
                    panel.style.maxHeight = panel.scrollHeight + "px";
                }
            });
        }

        window.signInWithGoogle = function() {
            signInWithPopup(auth, provider).catch(error => alert("حدث خطأ أثناء تسجيل الدخول: " + error.message));
        }
        window.logout = function() { signOut(auth); }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-profile').style.display = 'block';
                document.getElementById('user-menu').style.display = 'flex';
                document.getElementById('user-pic').src = user.photoURL;
                document.getElementById('user-name').innerText = user.displayName;
                
                const userRef = ref(db, `users/${user.uid}`);
                onValue(userRef, (snapshot) => {
                    const data = snapshot.val() || {};
                    userFavorites = data.favorites || {};
                    userHistory = data.history || {};
                });
            } else {
                currentUser = null; userFavorites = {}; userHistory = {};
                document.getElementById('login-btn').style.display = 'block';
                document.getElementById('user-profile').style.display = 'none';
                document.getElementById('user-menu').style.display = 'none';
            }
        });

        window.toggleFavorite = function(fileId, fileName, fileUrl) {
            if (!currentUser) { alert("يرجى تسجيل الدخول أولاً لإضافة الملفات للمفضلة."); return; }
            const favRef = ref(db, `users/${currentUser.uid}/favorites/${fileId}`);
            if (userFavorites[fileId]) { remove(favRef); } 
            else { set(favRef, { name: fileName, url: fileUrl }); } 
        }

        window.markAsViewed = function(fileId, fileName, fileUrl) {
            if (!currentUser) return; 
            const historyRef = ref(db, `users/${currentUser.uid}/history/${fileId}`);
            set(historyRef, { name: fileName, url: fileUrl, timestamp: Date.now() });
        }

        window.showUserFiles = function(type) {
            toggleSidebar(); 
            const listContainer = document.getElementById('files-list');
            listContainer.innerHTML = "";
            document.getElementById('files-title').innerText = type === 'favorites' ? 'ملفاتي المفضلة' : 'سجل المشاهدات';
            
            // ضبط زر العودة للرئيسية
            document.getElementById('dynamic-back-btn').onclick = function() { showScreen('subjects-screen'); };
            document.getElementById('dynamic-back-btn').innerHTML = " &rarr; العودة للرئيسية";

            showScreen('files-screen');

            const data = type === 'favorites' ? userFavorites : userHistory;
            if (Object.keys(data).length > 0) {
                Object.keys(data).forEach(fileId => {
                    const file = data[fileId];
                    const isFav = userFavorites[fileId] ? '❤️' : '🤍';
                    const isViewed = userHistory[fileId] ? `<span class="viewed-badge">✓ تم العرض</span>` : '';
                    
                    listContainer.innerHTML += `
                        <div class="file-card">
                            <div class="file-name">${isViewed} ${file.name}</div>
                            <div class="file-actions">
                                <button class="fav-btn" onclick="toggleFavorite('${fileId}', '${file.name.replace(/'/g, "\\'")}', '${file.url}')">${isFav}</button>
                                <a href="${file.url}" target="_blank" class="download-link" onclick="markAsViewed('${fileId}', '${file.name.replace(/'/g, "\\'")}', '${file.url}')">فتح الملف</a>
                            </div>
                        </div>
                    `;
                });
            } else {
                listContainer.innerHTML = "<p style='padding:20px; color:#666;'>لا توجد ملفات هنا بعد.</p>";
            }
        }
        // أضف هذا الكود في نهاية قسم الـ script
window.onpopstate = function(event) {
    if (event.state && event.state.screen) {
        // إذا كان هناك حالة محفوظة، نعود إليها بدون إضافة تاريخ جديد
        showScreen(event.state.screen, false);
    } else {
        // إذا عدنا للبداية تماماً، نظهر الشاشة الرئيسية
        showScreen('subjects-screen', false);
    }
};

// كود إضافي لضبط الحالة الأولية عند فتح الموقع لأول مرة
window.onload = function() {
    history.replaceState({ screen: 'subjects-screen' }, "", "");
};
        window.toggleFavorite = function(fileId, fileName, fileUrl) {
    if (!currentUser) { 
        alert("يرجى تسجيل الدخول أولاً لإضافة الملفات للمفضلة."); 
        return; 
    }
    
    const favRef = ref(db, `users/${currentUser.uid}/favorites/${fileId}`);
    const favIcon = document.getElementById(`fav-icon-${fileId}`); // الوصول للقلب

    if (userFavorites[fileId]) { 
        remove(favRef);
        if(favIcon) favIcon.innerText = '🤍'; // تغيير فوري
    } 
    else { 
        set(favRef, { name: fileName, url: fileUrl });
        if(favIcon) favIcon.innerText = '❤️'; // تغيير فوري
    } 
}
        window.markAsViewed = function(fileId, fileName, fileUrl) {
    if (!currentUser) return; 

    const historyRef = ref(db, `users/${currentUser.uid}/history/${fileId}`);
    set(historyRef, { name: fileName, url: fileUrl, timestamp: Date.now() });

    // إضافة الشارة فوراً في الواجهة
    const nameContainer = document.getElementById(`name-${fileId}`);
    if (nameContainer && !nameContainer.innerHTML.includes('viewed-badge')) {
        nameContainer.innerHTML = `<span class="viewed-badge">✓ تم العرض</span> ` + nameContainer.innerHTML;
    }
}
    </script>
